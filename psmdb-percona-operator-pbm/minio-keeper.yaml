apiVersion: v1
kind: Secret
metadata:
  name: my-psmdb-psmdb-db-minio-creds
  namespace: psmdb-test
type: Opaque
stringData:
  rootUser: minioadmin
  rootPassword: minioadmin123
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin123
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: my-psmdb-psmdb-db-minio
  namespace: psmdb-test
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ebs-sc
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-psmdb-psmdb-db-minio
  namespace: psmdb-test
  labels:
    app: my-psmdb-psmdb-db-minio
    psmdb-minio: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-psmdb-psmdb-db-minio
  template:
    metadata:
      labels:
        app: my-psmdb-psmdb-db-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2025-04-22T22-12-26Z
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: my-psmdb-psmdb-db-minio-creds
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-psmdb-psmdb-db-minio-creds
                  key: rootPassword
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: my-psmdb-psmdb-db-minio
---
apiVersion: v1
kind: Service
metadata:
  name: my-psmdb-psmdb-db-minio
  namespace: psmdb-test
spec:
  selector:
    app: my-psmdb-psmdb-db-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
