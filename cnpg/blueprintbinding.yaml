apiVersion: config.kio.kasten.io/v1alpha1
kind: BlueprintBinding
metadata:
  name: cnpg-blueprint-binding
  namespace: kasten-io
spec:
  blueprintRef:
    name: cnpg-blueprint
    namespace: kasten-io
  resources:
    matchAll:
      - type:
          operator: In
          values:
            - group: postgresql.cnpg.io
              resource: clusters
      - annotations:
          key: kanister.kasten.io/blueprint
          operator: DoesNotExist
