apiVersion: batch/v1
kind: Job
metadata:
  name: cockroachdb-init
  namespace: cockroachdb-test
  labels:
    app: cockroachdb
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: cockroachdb/cockroach:v24.3.33
          imagePullPolicy: IfNotPresent
          command:
            - "/cockroach/cockroach"
            - "init"
            - "--insecure"
            - "--host=cockroachdb-0.cockroachdb"
