apiVersion: cr.kanister.io/v1alpha1
kind: Blueprint
metadata:
  name: couchbase-operator-blueprint
  namespace: kasten-io
actions:

  restorePrehook:
    # Called by Kasten BEFORE PVC restore.
    # NOTE: As of Kasten 8.5.x there is a known bug where restorePrehook is never
    # triggered by the executor (the phase runs as a no-op). The code below is correct
    # and will work once the bug is fixed. See README.md for manual steps.
    #
    # The Couchbase Autonomous Operator continuously reconciles pod state. Without
    # intervention, the operator would recreate Couchbase pods after Kasten deletes them,
    # blocking PVC replacement.
    #
    # Solution:
    # 1. Patch CouchbaseCluster with spec.paused: true to halt operator reconciliation.
    # 2. Delete all Couchbase pods for this cluster so their PVCs are released.
    # The operator will not recreate pods while paused.
    phases:
      - func: KubeTask
        name: suspendAndDeletePods
        args:
          namespace: kasten-io
          image: michaelcourcy/kasten-tools:8.5.2
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              NS="{{ .Object.metadata.namespace }}"
              CLUSTER_NAME="{{ .Object.metadata.name }}"

              echo "=== Couchbase restore prehook: pausing cluster and deleting pods ==="

              # Pause the CouchbaseCluster to prevent operator from reconciling pods.
              kubectl patch couchbasecluster "${CLUSTER_NAME}" -n "${NS}" \
                --type merge -p '{"spec":{"paused":true}}'
              echo "CouchbaseCluster ${CLUSTER_NAME} paused (operator will not recreate pods)"

              # Delete all Couchbase pods for this cluster to release their PVCs.
              # The label couchbase_cluster=<name> is applied by the operator to all pods.
              echo "Deleting Couchbase pods to release PVCs"
              kubectl delete pod -n "${NS}" \
                -l "couchbase_cluster=${CLUSTER_NAME}" \
                --ignore-not-found

              # Wait for all pods to terminate
              echo "Waiting for Couchbase pods to terminate"
              kubectl wait pod -n "${NS}" \
                -l "couchbase_cluster=${CLUSTER_NAME}" \
                --for=delete --timeout=300s 2>/dev/null || true

              echo "=== Restore preparation complete: all Couchbase pods terminated ==="

  restorePosthook:
    # Called by Kasten AFTER PVC restore.
    # Phase 1 (KubeTask, kasten-io): Removes spec.paused so the operator resumes
    #   reconciliation and brings Couchbase pods back up with the restored PVCs.
    #   Couchbase uses couchstore (append-only, crash-safe) and runs a warmup/recovery
    #   pass on startup — a crash-consistent PVC snapshot is sufficient for recovery.
    # Phase 2 (WaitV2): Waits for the Couchbase cluster to have at least one ready member.
    phases:
      - func: KubeTask
        name: resumeCluster
        args:
          namespace: kasten-io
          image: michaelcourcy/kasten-tools:8.5.2
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              NS="{{ .Object.metadata.namespace }}"
              CLUSTER_NAME="{{ .Object.metadata.name }}"

              echo "=== Couchbase restore posthook phase 1: resuming cluster ==="

              # Remove the paused flag so the operator resumes reconciliation.
              # The operator will create pods and attach them to the restored PVCs.
              kubectl patch couchbasecluster "${CLUSTER_NAME}" -n "${NS}" \
                --type merge -p '{"spec":{"paused":false}}'
              echo "CouchbaseCluster ${CLUSTER_NAME} unpaused — operator will recreate pods"

      - func: WaitV2
        name: waitForCluster
        args:
          timeout: 15m
          conditions:
            anyOf:
              # Wait until at least one Couchbase member is ready.
              # .status.members.ready is populated by the operator once the cluster
              # node has joined and is healthy.
              - condition: '{{ if .status.members.ready }}true{{ else }}false{{ end }}'
                objectReference:
                  apiVersion: v2
                  group: couchbase.com
                  resource: couchbaseclusters
                  name: "{{ .Object.metadata.name }}"
                  namespace: "{{ .Object.metadata.namespace }}"
